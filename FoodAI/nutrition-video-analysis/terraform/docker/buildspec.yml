version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      - REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REPO=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO_NAME
      - echo ECR repository $ECR_REPO
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_REPO
      - IMAGE_TAG=$(date +%Y%m%d-%H%M%S)
      - echo Building Docker image...

  build:
    commands:
      - echo Build started on `date`
      - echo "Building with --no-cache to ensure fresh code (no Docker layer caching)"
      - docker build --no-cache --pull -f FoodAI/nutrition-video-analysis/terraform/docker/Dockerfile -t nutrition-api:latest FoodAI/nutrition-video-analysis/terraform/docker
      - echo Tagging images...
      - docker tag nutrition-api:latest $ECR_REPO:latest
      - docker tag nutrition-api:latest $ECR_REPO:$IMAGE_TAG
      - echo Image tagged with latest and timestamp

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing Docker images...
      - docker push $ECR_REPO:latest
      - docker push $ECR_REPO:$IMAGE_TAG
      - echo Writing image definitions file...
      - printf '[{"name":"nutrition-video-processor","imageUri":"%s"}]' $ECR_REPO:latest > imagedefinitions.json
      - echo Deploying to ECS...
      - CURRENT_TASK_DEF=$(aws ecs describe-task-definition --task-definition $ECS_TASK_FAMILY --region $REGION --query 'taskDefinition' --output json)
      - NEW_TASK_DEF=$(echo $CURRENT_TASK_DEF | python3 -c "import json,sys; td=json.load(sys.stdin); td['containerDefinitions'][0]['image']='$ECR_REPO:latest'; [td.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']]; print(json.dumps(td))")
      - NEW_TASK_DEF_ARN=$(echo $NEW_TASK_DEF | aws ecs register-task-definition --region $REGION --cli-input-json file:///dev/stdin --query 'taskDefinition.taskDefinitionArn' --output text)
      - echo Registered new task definition $NEW_TASK_DEF_ARN
      - aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition $NEW_TASK_DEF_ARN --force-new-deployment --region $REGION
      - echo ECS service updated. New task will start shortly.
      - echo Build complete!

artifacts:
  files:
    - imagedefinitions.json
